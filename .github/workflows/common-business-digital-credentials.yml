name: Common Business Digital Credentials CI

on:
  pull_request:
    types: [assigned, synchronize]
    paths:
      - "python/common/business-registry-digital-credentials/**"
  workflow_dispatch:

defaults:
  run:
    shell: bash
    working-directory: ./python/common/business-registry-digital-credentials

jobs:
  business-registry-digital-credentials-ci:
    uses: bcgov/bcregistry-sre/.github/workflows/backend-ci.yaml@main
    with:
      app_name: "business-registry-digital-credentials"
      working_directory: "./python/common/business-registry-digital-credentials"
      codecov_flag: "business-registry-digital-credentials"
