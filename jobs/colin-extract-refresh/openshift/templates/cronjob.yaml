apiVersion: template.openshift.io/v1
kind: Template
metadata:
  labels:
    name: ${NAME}
  name: ${NAME}-cronjob
objects:
- kind: "CronJob"
  apiVersion: "batch/v1"
  metadata:
    name: "${NAME}-${TAG}"
    labels:
      name: "${NAME}"
      environment: "${TAG}"
      role: "${ROLE}"
  spec:
    schedule: "${SCHEDULE}"
    concurrencyPolicy: "Forbid"
    successfulJobsHistoryLimit: ${SUCCESS_JOBS_HISTORY_LIMIT}
    failedJobsHistoryLimit: ${FAILED_JOBS_HISTORY_LIMIT}
    jobTemplate:
      metadata:
        labels:
          name: "${NAME}"
          environment: "${TAG}"
          role: "${ROLE}"
      spec:
        backoffLimit: ${JOB_BACKOFF_LIMIT}
        activeDeadlineSeconds: ${ACTIVE_DEADLINE_SECONDS}
        template:
          metadata:
            labels:
              name: "${NAME}"
              environment: "${TAG}"
              role: "${ROLE}"
          spec:
            containers:
              - name: "${NAME}-${TAG}"
                image: "${IMAGE_REGISTRY}/${IMAGE_NAMESPACE}/${NAME}:${TAG}"
                imagePullPolicy: Always
                envFrom:
                  - secretRef:
                    name: ${APP_SECRET_NAME}
                  resources:
                    requests:
                      cpu: "${CPU_REQUEST}"
                      memory: "${MEMORY_REQUEST}"
                    limits:
                      cpu: "${CPU_LIMIT}"
                      memory: "${MEMORY_LIMIT}"
parameters: 

  - name: NAME
    displayName: Name
    description: The name assigned to all of the OpenShift resources associated to the server instance.
    required: true
    value: colin-extract-refresh

  - name: TAG
    displayName: Environment TAG name
    description: The TAG name for this environment, e.g., dev, test, prod
    value: dev
    required: true

  - name: ROLE
    displayName: Role
    description: Role
    required: true
    value: job


  - name: IMAGE_NAMESPACE
    displayName: Image Namespace
    required: true
    description: The namespace of the OpenShift project containing the imagestream for the application.
    value: cc892f-tools

  - name: IMAGE_REGISTRY
    displayName: Image Registry
    required: true
    description: The image registry of the OpenShift project.
    value: image-registry.openshift-image-registry.svc:5000

  - name: APP_SECRET_NAME
    displayName: App Secret Name
    description: Secret with business-api and colin-api
    required: true
    value:  colin-extract-refresh-secret

  - name: "SCHEDULE"
    displayName: "Cron Schedule"
    description: "Cron Schedule to Execute the Job (using local cluster system TZ) to run at 0:55 * * TUE-SAT at pacific time so it will be 7:55 at UTC"
    value: "55 7 * * TUE-SAT"
    required: true

  - name: "SUCCESS_JOBS_HISTORY_LIMIT"
    displayName: "Successful Job History Limit"
    description: "The number of successful jobs that will be retained"
    value: "5"
    required: true

  - name: "FAILED_JOBS_HISTORY_LIMIT"
    displayName: "Failed Job History Limit"
    description: "The number of failed jobs that will be retained"
    value: "2"
    required: true

  - name: "JOB_BACKOFF_LIMIT"
    displayName: "Job Backoff Limit"
    description: "The number of attempts to try for a successful job outcome"
    value: "0"
    required: false

  - name: ACTIVE_DEADLINE_SECONDS
    displayName: Active deadline seconds 
    required: true
    value: "300"
  
  - name: CPU_REQUEST
    displayName: CPU request
    required: true
    value: 50m
  
  - name: CPU_LIMIT
    displayName: CPU limit
    required: true
    value: 200m

  - name: MEMORY_REQUEST
    displayName: memory request
    required: true
    value: 128Mi

  - name: MEMORY_LIMIT
    displayName: Memory Limit
    required: true
    value: 512Mi